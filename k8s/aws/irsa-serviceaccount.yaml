# ============================================================
# Kubernetes ServiceAccount — annotated with the IRSA role ARN
#
# This is the BRIDGE between Kubernetes and AWS IAM.
# The annotation tells EKS: "pods using this SA should get
# credentials for the specified IAM role"
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: app
  annotations:
    # Paste the ARN from terraform output "app_irsa_role_arn" here
    eks.amazonaws.com/role-arn: arn:aws:iam::****:role/roles/dev-app-irsa-role
---
# ============================================================
# Test Pod — proves IRSA works without any credentials
#
# Deploy this pod, exec into it, and run:
#   aws s3 ls s3://your-bucket
# It should work. Then try a bucket you have no access to —
# it should be denied. That proves least privilege is working.
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: irsa-test-pod
  namespace: app
spec:
  serviceAccountName: app-sa   # <-- this links the pod to the IRSA role

  containers:
    - name: aws-cli
      image: amazon/aws-cli:latest
      command: ["sleep", "3600"]   # keep pod alive for testing

      env:
        # AWS SDK automatically uses the projected token — no keys needed
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"

      # No AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY — intentional!
      # EKS injects credentials automatically via the projected volume below.

  # EKS automatically mounts the OIDC token here when IRSA is configured
  # You don't need to add this manually — shown here for learning purposes
  # volumes:
  #   - name: aws-iam-token
  #     projected:
  #       sources:
  #         - serviceAccountToken:
  #             audience: sts.amazonaws.com
  #             expirationSeconds: 86400
  #             path: token
