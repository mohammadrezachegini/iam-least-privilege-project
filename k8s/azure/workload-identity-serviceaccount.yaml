# ============================================================
# AKS Workload Identity - K8s ServiceAccount
#
# Two annotations needed (different from AWS/GCP):
#   azure.workload.identity/client-id  -> Managed Identity client ID
#   azure.workload.identity/tenant-id  -> Azure tenant ID
#
# Also need the label on the pod:
#   azure.workload.identity/use: "true"
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: app
  annotations:
    # Paste value from terraform output "app_identity_client_id"
    azure.workload.identity/client-id: "*"
    azure.workload.identity/tenant-id: "*"
---
apiVersion: v1
kind: Pod
metadata:
  name: workload-identity-test-pod
  namespace: app
  labels:
    # This label is REQUIRED for AKS Workload Identity to inject credentials
    azure.workload.identity/use: "true"
spec:
  serviceAccountName: app-sa
  containers:
    - name: azure-cli
      image: mcr.microsoft.com/azure-cli:latest
      command: ["sleep", "3600"]
      env:
        - name: AZURE_TENANT_ID
          value: "*"
